<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Prediction Result - AgriAdvisor</title>
<link rel="stylesheet" href="css/style.css">
<style>

/* ── CROP CARD ── */
.crop-card {
  background: #ffffff;
  border-radius: 14px;
  margin-bottom: 16px;
  border-left: 6px solid #2ecc71;
  box-shadow: 0px 4px 16px rgba(0,0,0,0.10);
  overflow: hidden;
  transition: transform 0.2s;
}

.crop-card:hover {
  transform: scale(1.02);
}

.crop-top {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px 10px 16px;
}

.crop-img {
  width: 68px;
  height: 68px;
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid #e0f5eb;
  flex-shrink: 0;
}

.crop-img-placeholder {
  width: 68px;
  height: 68px;
  border-radius: 10px;
  background: linear-gradient(135deg, #e0f5eb, #c8f0d8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  flex-shrink: 0;
  border: 2px solid #e0f5eb;
}

.crop-info { flex: 1; text-align: left; }

.crop-rank-name {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a1a;
  margin: 0 0 4px 0;
}

.rank-badge { font-size: 20px; margin-right: 4px; }

/* ── CONFIDENCE BAR ── */
.confidence-section {
  padding: 0 16px 14px 16px;
}

.confidence-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #555;
  margin-bottom: 6px;
  font-weight: 600;
}

.confidence-bar-bg {
  width: 100%;
  height: 10px;
  background: #e8f5e9;
  border-radius: 10px;
  overflow: hidden;
}

.confidence-bar-fill {
  height: 100%;
  border-radius: 10px;
  width: 0%;
  transition: width 1.2s ease-in-out;
}

/* ── SUMMARY BAR ── */
.result-summary {
  display: flex;
  justify-content: space-around;
  background: linear-gradient(135deg, #e9fff3, #d4f5e2);
  border-radius: 12px;
  padding: 14px 10px;
  margin-bottom: 20px;
}

.summary-item { text-align: center; }

.summary-value {
  font-size: 19px;
  font-weight: 700;
  color: #1e8449;
}

.summary-label {
  font-size: 11px;
  color: #666;
  margin-top: 2px;
}

/* ── ENHANCED ADVICE SECTION ── */
.advice-section {
  margin-top: 20px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #e8f5e9;
}

.advice-header {
  background: linear-gradient(135deg, #2ecc71, #1e8449);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.advice-icon { font-size: 18px; }

.advice-title {
  color: white;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.advice-general {
  background: #fff8ee;
  padding: 14px 18px;
  border-bottom: 1px solid #f0e8d0;
}

.advice-general p {
  color: #5a3e00;
  font-size: 14px;
  line-height: 1.6;
  margin: 0;
  font-weight: 500;
}

.advice-specific {
  background: #f0fdf4;
  padding: 14px 18px;
  border-bottom: 1px solid #d4f5e2;
}

.advice-specific-title {
  font-size: 13px;
  font-weight: 700;
  color: #1e8449;
  margin-bottom: 8px;
}

.advice-specific p {
  color: #2d6a4f;
  font-size: 13.5px;
  line-height: 1.7;
  margin: 0;
}

/* ── INPUT TAGS ── */
.advice-tags {
  background: #ffffff;
  padding: 12px 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.advice-tag {
  background: #e9fff3;
  color: #1e8449;
  border: 1px solid #b7e4c7;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="assets/logo.png" class="nav-logo" alt="Logo">
    <span class="nav-title">AgriAdvisor</span>
  </div>
  <div class="nav-right">
    <a href="predict.html">Home</a>
    <a href="history.html">History</a>
    <a href="profile.html">Profile</a>
    <a href="#" onclick="logoutUser()">Logout</a>
  </div>
</div>

<div class="hero">
  <div class="result-card">

    <img src="assets/logo.png" class="login-logo" alt="AgriAdvisor Logo">
    <h2>AgriAdvisor</h2>
    <h3>Crop Recommendation Result</h3>

    <!-- Summary bar -->
    <div class="result-summary" id="result-summary"></div>

    <!-- Crop cards -->
    <div class="result-box" id="result-box"></div>

    <!-- Enhanced Advice -->
    <div class="advice-section" id="advice-section"></div>

    <button onclick="goBack()" style="margin-top:20px;">
      🔄 Try Another Prediction
    </button>

  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/result.js"></script>

</body>
</html>
