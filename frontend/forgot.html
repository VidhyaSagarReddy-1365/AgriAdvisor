<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Forgot Password - AgriAdvisor</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="hero">

<div class="forgot-card">

<img src="assets/logo.png" class="login-logo" alt="AgriAdvisor Logo">

<h2>AgriAdvisor</h2>
<h3>Reset Password</h3>

<form onsubmit="resetPassword(event)">

<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>

<!-- SECURITY QUESTIONS -->

<label>Security Question 1</label>
<p class="question-text">What is your favorite food?</p>
<input type="text" id="answer1" placeholder="Enter answer" required>

<label>Security Question 2</label>
<p class="question-text">What was your first school name?</p>
<input type="text" id="answer2" placeholder="Enter answer" required>

<label>New Password</label>
<input type="password" id="newPassword" placeholder="Enter new password" required>

<button type="submit">Reset Password</button>

<p>
<a href="login.html">Back to Login</a>
</p>

</form>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
