<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Profile - AgriAdvisor</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="assets/logo.png" class="nav-logo" alt="Logo">
    <span class="nav-title">AgriAdvisor</span>
  </div>
 <div class="nav-right">
    <a href="predict.html">Home</a>
    <a href="history.html">History</a>
    <a href="profile.html" class="active">Profile</a>
    <a href="#" onclick="logoutUser()">Logout</a>
</div>
</div>

<!-- MAIN -->
<div class="main-container">
  <div class="profile-card">

    <img src="assets/logo.png" class="login-logo" alt="Logo">
    <h2>AgriAdvisor</h2>
    <h3>My Profile</h3>

    <!-- User Info -->
    <div class="profile-info">
      <div class="profile-row">
        <span class="profile-label">Name</span>
        <span id="profile-name" class="profile-value">—</span>
      </div>
      <div class="profile-row">
        <span class="profile-label">Email</span>
        <span id="profile-email" class="profile-value">—</span>
      </div>
    </div>

    <!-- Change Password Section -->
    <div class="change-password-section">
      <h4>Change Password</h4>

      <label>New Password</label>
      <input type="password" id="new-password" placeholder="Enter new password">

      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Confirm new password">

      <button onclick="changePassword()">Update Password</button>
    </div>

    <!-- Logout -->
    <button class="logout-btn" onclick="logoutUser()">Logout</button>

  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
